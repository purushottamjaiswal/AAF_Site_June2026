<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="true">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#2c3e50">
    <title>BTS Site Map Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>BTS Sites</h1>
            <p>Coverage Map</p>
        </header>

        <div class="controls-section">
            <button id="filterToggle" class="filter-toggle-btn" title="Show filters">⚙️</button>
            
            <div class="filter-group" id="filterGroup">
                <div class="filter-item">
                    <select id="mapTypeSelector">
                        <option value="2d">2D Map</option>
                        <option value="3d">3D Map</option>
                    </select>
                </div>
                <div class="filter-item">
                    <select id="opcoFilter">
                        <option value="">All OPCOs</option>
                    </select>
                </div>
                <div class="filter-item">
                    <select id="techFilter">
                        <option value="">All Tech</option>
                    </select>
                </div>
                <button id="resetFilters" class="btn-reset">Reset</button>
            </div>
            
            <div class="data-info">
                <span id="markerCount">0</span>
                <span id="filteredCount">0</span>
            </div>
        </div>

        <div class="content-wrapper">
            <div class="map-container">
                <div id="map"></div>
                <div id="cesium-container" class="cesium-container" style="display: none;"></div>
                <div id="loading" class="loading-spinner">
                    <p>Loading...</p>
                </div>
            </div>
            <div class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <h2>BTS Info</h2>
                    <button id="sidebarClose" class="sidebar-close-btn">✕</button>
                </div>
                <div id="siteList" class="site-list"></div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
