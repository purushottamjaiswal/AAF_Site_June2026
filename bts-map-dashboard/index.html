<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTS Site Map Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>BTS Site Map Dashboard</h1>
            <p>Base Transceiver Station Locations & Coverage</p>
        </header>

        <div class="controls-section">
            <div class="filter-group">
                <div class="filter-item">
                    <label for="opcoFilter">Filter by OPCO:</label>
                    <select id="opcoFilter">
                        <option value="">All OPCOs</option>
                    </select>
                </div>
                <div class="filter-item">
                    <label for="techFilter">Filter by Technology:</label>
                    <select id="techFilter">
                        <option value="">All Technologies</option>
                    </select>
                </div>
                <div class="filter-item">
                    <button id="resetFilters" class="btn-reset">Reset Filters</button>
                </div>
            </div>
            <div class="data-info">
                <span id="markerCount">Total BTS Sites: 0</span>
                <span id="filteredCount">Filtered: 0</span>
            </div>
        </div>

        <div class="content-wrapper">
            <div class="map-container">
                <div id="map"></div>
                <div id="loading" class="loading-spinner">
                    <p>Loading BTS data from Google Sheets...</p>
                </div>
            </div>
            <div class="sidebar">
                <div class="sidebar-header">
                    <h2>BTS Information</h2>
                </div>
                <div id="siteList" class="site-list"></div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
    <script src="app.js"></script>
</body>
</html>
